<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="mGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#7c6fd4"/>
    </linearGradient>
    <linearGradient id="circleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5b5bd6"/>
      <stop offset="100%" style="stop-color:#7c6fd4"/>
    </linearGradient>
  </defs>

  <!-- Background white -->
  <rect width="500" height="500" fill="white"/>

  <!-- M e madhe -->
  <text x="250" y="300" text-anchor="middle" font-family="Georgia, serif" font-size="220" font-weight="700" fill="url(#mGrad)">M</text>

  <!-- Kodi <  /> -->
  <text x="95" y="260" text-anchor="middle" font-family="Georgia, serif" font-size="50" font-weight="400" fill="#5b5bd6">&lt;</text>
  <text x="405" y="260" text-anchor="middle" font-family="Georgia, serif" font-size="50" font-weight="400" fill="#5b5bd6">/&gt;</text>

  <!-- Rreth WordPress -->
  <circle cx="175" cy="110" r="45" fill="none" stroke="url(#circleGrad)" stroke-width="2.5"/>
  <circle cx="175" cy="110" r="35" fill="none" stroke="url(#circleGrad)" stroke-width="1" opacity="0.5"/>
  <text x="175" y="122" text-anchor="middle" font-family="Georgia, serif" font-size="36" font-weight="700" fill="url(#circleGrad)">W</text>

  <!-- MARIA -->
  <text x="250" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="52" font-weight="700" fill="#1a1a2e" letter-spacing="18">MARIA</text>

  <!-- Vija dhe WEB DESIGNER -->
  <line x1="80" y1="378" x2="180" y2="378" stroke="#5b5bd6" stroke-width="1.5"/>
  <text x="250" y="393" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="400" fill="#5b5bd6" letter-spacing="6">WEB DESIGNER</text>
  <line x1="320" y1="378" x2="420" y2="378" stroke="#5b5bd6" stroke-width="1.5"/>

  <!-- HTML CSS JS WordPress -->
  <text x="110" y="440" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#e44d26">HTML</text>
  <line x1="152" y1="428" x2="152" y2="445" stroke="#ccc" stroke-width="1"/>
  <text x="195" y="440" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#264de4">CSS</text>
  <line x1="232" y1="428" x2="232" y2="445" stroke="#ccc" stroke-width="1"/>
  <text x="280" y="440" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#f7df1e">JavaScript</text>
  <line x1="330" y1="428" x2="330" y2="445" stroke="#ccc" stroke-width="1"/>
  <text x="390" y="440" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#21759b">WordPress</text>
</svg>